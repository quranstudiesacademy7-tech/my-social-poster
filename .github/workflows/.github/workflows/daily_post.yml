name: Daily Social Media Post

on:
  schedule:
    # Har roz UTC 10:00 baje chalega (Pakistan time ~ 3:00 PM PKT)
    # Zarurat ke mutabiq time badal sakte hain (cron format: minute hour * * *)
    - cron: "0 10 * * *"
  workflow_dispatch: {}   # isse aap manually bhi "Run workflow" button se chala sakte hain

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Repo checkout karna
        uses: actions/checkout@v4

      - name: Python setup karna
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies install karna
        run: pip install requests

      - name: Post karna
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python post_bot.py
